<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>

		<title>Frontend Mentor | Order summary card</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<link href="/style.css" rel="stylesheet" />
		<!-- <link href="/dist/output.css" rel="stylesheet" /> -->
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body>
		<main class="container">
			<main class="card">
				<img
					src="/images/illustration-hero.svg"
					alt="illustration-hero"
					class="card-image"
				/>
				<div class="card-body">
					<h1 class="card-heading">Order Summary</h1>
					<p class="card-paragraph">
						You can now listen to millions of songs, audiobooks, and podcasts on
						any device anywhere you like!
					</p>
					<div class="plan-box">
						<img
							class="plan-image"
							src="/images/icon-music.svg"
							alt="icon-music"
						/>
						<div class="plan-detail">
							<h2 class="plan-heading">Annual Plan</h2>
							<p class="plan-paragraph">$59.99/year</p>
						</div>
						<a class="plan-action" href="">Change</a>
					</div>
				</div>
				<div class="card-footer">
					<button class="payment-button">
						Proceed to Payment
					</button>		
					<a class="cancel-action" href=""> Cancel Order </a>
				</div>
			</main>
		</div>
		<footer class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
				>Frontend Mentor</a
			>. Coded by <a href="#">Muhammad Rabbani R.</a>.
		</footer>
	</body>
</html>
