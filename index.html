<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>

		<title>Frontend Mentor | Order summary card</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<link href="/style.css" rel="stylesheet" />
		<!-- <link href="/dist/output.css" rel="stylesheet" /> -->
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div class="card-header">
					<img
						src="/images/illustration-hero.svg"
						class="card-image rounded-t-2xl"
					/>
				</div>
				<div class="card-body">
					<h1 class="text-2xl font-extrabold text-gray-700">Order Summary</h1>
					<p class="card-paragraph">
						You can now listen to millions of songs, audiobooks, and podcasts on
						any device anywhere you like!
					</p>
					<div class="plan-box flex justify-center items-center rounded-lg">
						<img
							class="plan-image"
							src="/images/icon-music.svg"
							alt="icon-music"
						/>
						<div class="plan-detail">
							<h2 class="plan-label text-sm font-semibold">Annual Plan</h2>
							<p class="plan-paragraph">$59.99/year</p>
						</div>
						<a class="plan-action text-sm font-semibold underline" href=""
							>Change</a
						>
					</div>
				</div>
				<div class="card-footer">
					<div class="proceed rounded-lg">
						<button class="payment-button text-white text-sm font-semibold m-3">
							Proceed to Payment
						</button>
					</div>
					<div class="cancel font-semibold my-8">
						<a class="cancel-action text-sm" href=""> Cancel Order </a>
					</div>
				</div>
			</div>
		</div>
		<div class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
				>Frontend Mentor</a
			>. Coded by <a href="#">Your Name Here</a>.
		</div>
	</body>
</html>
